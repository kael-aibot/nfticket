name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        npm install
        cd apps/shared && npm install
        cd ../provider && npm install
        cd ../app && npm install
    
    - name: Lint
      run: npm run lint || true
    
    - name: Build Provider App
      run: cd apps/provider && npm run build || true
      
    - name: Build Buyer App
      run: cd apps/app && npm run build || true

  anchor:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
    
    - name: Install Solana
      run: |
        sh -c "$(curl -sSfL https://release.solana.com/v1.18.0/install)"
        export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
        solana --version
    
    - name: Install Anchor
      run: |
        cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
        avm install latest
        avm use latest
    
    - name: Build Anchor Program
      run: |
        cd anchor-program
        anchor build
      
    - name: Test Anchor Program
      run: |
        cd anchor-program
        anchor test || true
